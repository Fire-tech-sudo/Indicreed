<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Logo Group centered in the viewBox -->
  <g transform="translate(120, 220)">
    
    <!-- The stylized, oversized "I" -->
    <rect x="0" y="-75" width="22" height="75" fill="#ffffff" />
    
    <!-- The rest of "NDICREED" -->
    <text x="28" y="0" fill="#ffffff" font-family="Impact, 'Arial Black', sans-serif" font-weight="900" font-size="72" letter-spacing="1.5">
      NDICREED
    </text>
    
    <!-- The "STUDIO" text -->
    <text x="345" y="-2" fill="#ffffff" font-family="Montserrat, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="48" letter-spacing="7">
      STUDIO
    </text>
    
  </g>
</svg>
